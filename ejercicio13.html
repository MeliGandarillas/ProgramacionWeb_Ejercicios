<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificadora de edad</title>
    <link rel="stylesheet" href="css/ejercicio9.css">
</head>
<body>
    <h1 class="titulo">Verificadora de edad</h1>
    <p class="parrafo">Ingresa tu edad para verificar si puedes votar o no.</p>
    <div class="contenedor-formulario">
        <form id="form-calculadora" onsubmit="verificar(event)">
            <div>
                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" min="0" max="130" required placeholder="Escribe tu edad en años">
            </div>
            <button type="submit" class="boton-enviar">Verificar</button>
            <div>
                <label for="resultado">Resultado:</label>
                <input type="text" id="resultado" required readonly>
            </div>
        </form>
    </div>
    <script src="js/ejercicio13.js"></script>
</body>
</html>
